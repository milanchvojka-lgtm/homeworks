name: Cron jobs

# Cron infrastructure pro Homeworks (viz DECISIONS.md D1).
# Volá `/api/cron/*` endpointy na Vercelu s `CRON_SECRET` headerem.
#
# Repo secrets potřebné v Settings → Secrets and variables → Actions:
#   DEPLOY_URL    — kořenová URL produkčního Vercel deploye
#   CRON_SECRET   — sdílený secret, identický s `CRON_SECRET` env na Vercelu
#
# Cron expressions GitHub Actions interpretuje v UTC; každý handler je
# idempotentní + uvnitř si timezone-aware kontroly dělá sám (viz D5).
# Dvojí spuštění (zima/léto offset) handlerům nevadí — operace jsou idempotentní.

on:
  workflow_dispatch:
    inputs:
      endpoint:
        description: "Cron endpoint to ping (without /api/cron/ prefix)"
        required: true
        default: "health"
  schedule:
    # daily-rollover: 00:05 Prague (23:05 UTC zima / 22:05 UTC léto)
    - cron: "5 23 * * *"
    - cron: "5 22 * * *"
    # daily-close: 23:59 Prague (22:59 UTC zima / 21:59 UTC léto)
    - cron: "59 22 * * *"
    - cron: "59 21 * * *"
    # weekly-rotation: Sun 23:55 Prague (22:55 UTC zima / 21:55 UTC léto)
    - cron: "55 22 * * 0"
    - cron: "55 21 * * 0"
    # weekly-close: Sun 23:59 Prague (22:59 UTC zima / 21:59 UTC léto)
    # — sdílí cron expressions s daily-close, ale handler taky běží denně.
    # Aby weekly-close jel jen v neděli, používáme separátní expression na Sun.
    - cron: "59 22 * * 0"
    - cron: "59 21 * * 0"
    # recurring-tasks: 06:00 Prague (05:00 UTC zima / 04:00 UTC léto)
    - cron: "0 5 * * *"
    - cron: "0 4 * * *"
    # admin-digest + claim-timeout: každých 15 minut (oba zároveň)
    - cron: "*/15 * * * *"

jobs:
  manual:
    name: Manual ping ${{ github.event.inputs.endpoint }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Sanity check secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_URL }}" ]; then echo "::error::DEPLOY_URL not set"; exit 1; fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then echo "::error::CRON_SECRET not set"; exit 1; fi
      - name: Call endpoint
        env:
          ENDPOINT: ${{ github.event.inputs.endpoint }}
        run: |
          set -euo pipefail
          curl -fsS -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.DEPLOY_URL }}/api/cron/${ENDPOINT}"; echo

  scheduled:
    name: Scheduled (${{ github.event.schedule }})
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Sanity check secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_URL }}" ]; then echo "::error::DEPLOY_URL not set"; exit 1; fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then echo "::error::CRON_SECRET not set"; exit 1; fi
      - name: Route schedule → endpoint(s)
        env:
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          ENDPOINTS=""
          case "${SCHEDULE}" in
            "5 23 * * *"|"5 22 * * *")   ENDPOINTS="daily-rollover" ;;
            "59 22 * * *"|"59 21 * * *") ENDPOINTS="daily-close" ;;
            "55 22 * * 0"|"55 21 * * 0") ENDPOINTS="weekly-rotation" ;;
            "59 22 * * 0"|"59 21 * * 0") ENDPOINTS="weekly-close" ;;
            "0 5 * * *"|"0 4 * * *")     ENDPOINTS="recurring-tasks" ;;
            "*/15 * * * *")              ENDPOINTS="claim-timeout admin-digest" ;;
            *) echo "::error::Unknown schedule: ${SCHEDULE}"; exit 1 ;;
          esac
          for E in $ENDPOINTS; do
            echo "Schedule ${SCHEDULE} → /api/cron/${E}"
            curl -fsS -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.DEPLOY_URL }}/api/cron/${E}"; echo
          done
